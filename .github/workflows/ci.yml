name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy types-requests
      - name: Check formatting (black)
        run: black --check --diff src/ tests/ app/
      - name: Check import sorting (isort)
        run: isort --check-only --diff src/ tests/ app/
      - name: Lint (flake8)
        run: flake8 src/ tests/ app/ --max-line-length=88 --extend-ignore=E203,W503
      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,notebooks]"
      - name: Run tests
        run: pytest --cov=src/globe_cloud_insights --cov-report=term-missing -v

  app-check:
    name: Dashboard smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify app imports
        run: |
          cd app && python -c "
          import sys; sys.path.insert(0, '../src')
          import importlib.util
          spec = importlib.util.spec_from_file_location('streamlit_app', 'streamlit_app.py')
          assert spec is not None, 'Could not find streamlit_app.py'
          print('Dashboard module found and loadable.')
          "

  docs:
    name: Documentation check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check documentation files exist
        run: |
          test -f README.md
          test -f docs/glossary.md
          test -f docs/tutorial.md
          test -f data/README.md
          test -f CONTRIBUTING.md
          echo "All required documentation files present."
